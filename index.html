
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Colchas Jimenez</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}
body{background:#f5f2eb;color:#222}
.hero{
height:70vh;color:white;display:flex;align-items:center;justify-content:center;
text-align:center;padding:20px;
background:linear-gradient(rgba(0,0,0,.4),rgba(0,0,0,.6)),url('Portada colchas.png');background-size:cover;background-position:center top;
}
.hero h1{font-size:4rem}
.hero p{margin-top:10px}
.gold{color:#d8a84b}
.products{
display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;padding:60px;
}
.card{
background:white;border-radius:25px;overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,.08);
transition:.3s;
}
.card:hover{transform:translateY(-8px)}
.card img{width:100%;height:340px;object-fit:cover}
.info{padding:20px}
.price{font-size:24px;color:#d8a84b;font-weight:bold}
.cart{
position:fixed;right:20px;top:20px;width:330px;z-index:999;
background:white;border-radius:20px;padding:20px;
box-shadow:0 10px 35px rgba(0,0,0,.2)
}
button{
border:none;background:#111;color:white;padding:12px;
border-radius:12px;cursor:pointer;width:100%
}
select,input{width:100%;padding:10px;border-radius:10px;margin:10px 0}
.qty{display:flex;gap:10px;align-items:center;justify-content:center;margin:10px 0}
.qty button{width:40px}
.total{font-weight:bold;margin-top:15px;color:#d8a84b}

@media(max-width:768px){
.cart{
position:fixed;
bottom:0;
top:auto;
left:0;
right:0;
width:100%;
margin:0;
border-radius:20px 20px 0 0;
max-height:60px;
overflow:hidden;
transition:.4s;
}
.cart.open{
max-height:75vh;
overflow:auto;
}
.cartToggle{
display:block;
font-weight:bold;
text-align:center;
padding:10px;
cursor:pointer;
}
.hero{
height:55vh;
background-position:center center;
}
}

@media(max-width:768px){

.cart{
position:fixed;
left:0;
right:0;
bottom:0;
top:auto;

width:100%;
max-height:80vh;

background:white;
border-radius:20px 20px 0 0;

box-shadow:0 -10px 30px rgba(0,0,0,.25);

transform:translateY(85%);
transition:transform .35s ease;
overflow:hidden;
z-index:9999;
}

.cart.open{
transform:translateY(0);
overflow:auto;
}

.cartToggle{
position:sticky;
top:0;
background:white;
padding:14px;
font-weight:600;
text-align:center;
cursor:pointer;
border-bottom:1px solid #eee;
}

.cartToggle::before{
content:"";
display:block;
width:50px;
height:5px;
background:#ddd;
border-radius:10px;
margin:0 auto 8px;
}

#cart{
padding:10px 0;
}

.total{
font-size:18px;
padding-top:10px;
}

.hero h1{
font-size:2.5rem;
}

.products{
padding:20px;
}
}
</style>
</head>
<body>

<div class="cart" id="cartBox"><div class="cartToggle" onclick="toggleCart()">🛒 Abrir carrito</div>
<h2>🛒 Carrito</h2>
<input id="nombreCliente" placeholder="Tu nombre">
<div id="cart"></div>
<div class="total" id="total">Total:0€</div><br>
<button onclick="enviarWhatsApp()">Reservar todo</button>
</div>

<section class="hero">
<div>
<h1>Colchas <span class="gold">Jimenez</span></h1>
<p>Diseño premium · Reserva por WhatsApp</p>
</div>
</section>

<div class="products" id="products"></div>

<script>
const productos=[
{name:"Colcha M1",price:10,img:"https://images.unsplash.com/photo-1505693416388-ac5ce068fe85"},
{name:"Colcha M2",price:10,img:"https://images.unsplash.com/photo-1505693416388-ac5ce068fe85"},
{name:"Colcha M3",price:10,img:"https://images.unsplash.com/photo-1505693416388-ac5ce068fe85"},
{name:"Colcha M4",price:10,img:"https://images.unsplash.com/photo-1505693416388-ac5ce068fe85"},
{name:"Colcha Luxury",price:18,img:"https://images.unsplash.com/photo-1505693416388-ac5ce068fe85"},
{name:"Colcha Premium",price:20,img:"https://images.unsplash.com/photo-1505693416388-ac5ce068fe85"},
];

let cart=[];

document.getElementById("products").innerHTML=productos.map((p,i)=>`
<div class=card>
<img src="${p.img}">
<div class=info>
<h3>${p.name}</h3>
<div class=price>${p.price}€</div>
<select id=s${i}>
<option>1.50 (250x260)</option>
<option>1.05 (200x260)</option>
</select>
<div class=qty>
<button onclick="q${i}.innerText=Math.max(1,+q${i}.innerText-1)">-</button>
<span id=q${i}>1</span>
<button onclick="q${i}.innerText=+q${i}.innerText+1">+</button>
</div>
<button onclick="add('${p.name}',${p.price},q${i}.innerText,s${i}.value)">Añadir</button>
</div></div>`).join('');

function add(name,price,qty,size){
cart.push({name,price,qty:+qty,size});
render()
}
function render(){
let total=0;
cart.innerHTML="";
document.getElementById("cart").innerHTML=cart.map(x=>{
total+=x.price*x.qty;
return `${x.name} (${x.size}) x${x.qty}<br>`
}).join("<hr>");
document.getElementById("total").innerText="Total:"+total+"€"
}
function enviarWhatsApp(){
let n=document.getElementById("nombreCliente").value;
let txt="🛒 NUEVO PEDIDO\nNombre:"+n+"\n\n";
cart.forEach(x=>txt+=`${x.name} ${x.size} x${x.qty}\n`)
window.open("https://wa.me/34623979170?text="+encodeURIComponent(txt))
}

function toggleCart(){
const cart=document.getElementById("cartBox");
cart.classList.toggle("open");

const btn=document.querySelector(".cartToggle");
btn.innerText = cart.classList.contains("open")
? "⬇️ Cerrar carrito"
: "🛒 Abrir carrito";
}

  document.addEventListener("click", function(e){
const cart=document.getElementById("cartBox");

if(cart.classList.contains("open")){
if(!cart.contains(e.target) && !e.target.classList.contains("cartToggle")){
cart.classList.remove("open");

const btn=document.querySelector(".cartToggle");
btn.innerText="🛒 Abrir carrito";
}
}
});
</script>
</body>
</html>


</body>
</html>
